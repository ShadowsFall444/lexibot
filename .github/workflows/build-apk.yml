name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install React Native CLI
        run: npm install -g @react-native-community/cli@15

      - name: Scaffold bare React Native project
        run: |
          npx @react-native-community/cli@15 init LeximBuild \
            --version 0.76.9 \
            --skip-install \
            --directory LeximBuild
          echo "Scaffold complete"

      - name: Copy app source into project
        run: |
          # Copy top-level JS/TS and config files so the scaffolded project uses the repo app code
          for f in index.js package.json app.json babel.config.js metro.config.js; do
            [ -f "$f" ] && cp "$f" LeximBuild/ && echo "Copied $f" || true
          done

          # Copy source files
          for f in *.tsx *.ts *.js *.jsx; do
            [ -f "$f" ] && cp "$f" LeximBuild/ && echo "Copied $f" || true
          done

          # Copy common directories including native android/ios if present
          for d in src components screens hooks lib assets images android ios; do
            [ -d "$d" ] && cp -r "$d" LeximBuild/ && echo "Copied dir $d" || true
          done

      - name: Install dependencies
        working-directory: LeximBuild
        run: npm install --legacy-peer-deps

      - name: Make gradlew executable
        working-directory: LeximBuild/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: LeximBuild/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Show build outputs
        run: |
          echo "Listing build outputs for LeximBuild/android/app/build/outputs:"
          ls -R LeximBuild/android/app/build/outputs || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lexibot-debug-apk
          path: LeximBuild/android/app/build/outputs/**/*.apk
          retention-days: 30
          if-no-files-found: error